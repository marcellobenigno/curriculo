<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Mapa - João Pessoa</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    height: 100%;
    margin: 0;
}

#map {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Coordenadas aproximadas de João Pessoa
var lat = -7.115;
var lon = -34.863;

// cria o mapa
var map = L.map('map').setView([lat, lon], 13);

// camada do OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// marcador opcional
L.marker([lat, lon])
  .addTo(map)
  .bindPopup("João Pessoa - PB")
  .openPopup();

</script>

</body>
</html>
